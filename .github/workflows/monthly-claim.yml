name: Monthly Beijing Telecom Claim

on:
  schedule:
    # Beijing time 08:00 on day 1-3 each month.
    - cron: "0 0 1-3 * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Ignore monthly success state and run anyway"
        required: false
        default: "false"
      dry_run:
        description: "Stop before the final telecom submit button"
        required: false
        default: "false"
      runner_target:
        description: "Manual run target: github_hosted or local_selfhosted"
        required: false
        default: "local_selfhosted"
      connectivity_mode:
        description: "Override connectivity mode for this manual run: direct, http_proxy, ssh_tunnel, or proxy_pool"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  claim:
    runs-on: ${{ fromJSON(((github.event_name == 'schedule') || (github.event_name == 'workflow_dispatch' && github.event.inputs.runner_target != 'github_hosted')) && '["self-hosted","macOS","X64","telecom-claim-local"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 35
    env:
      TELECOM_PHONE: ${{ secrets.TELECOM_PHONE }}
      TELECOM_ENTRY_URL: ${{ vars.TELECOM_ENTRY_URL || 'https://wapbj.189.cn/wap2017/index/preDepositHighPic_check.html?campaignId=16239231179147085&version=V1&channelId=dx531&wxopenid=43178673fef1756c9db3fd4216bf911454dffc23a55b56ca538af38fc915ad85' }}
      TELECOM_TARGET_PACKAGE: ${{ vars.TELECOM_TARGET_PACKAGE || 'voice200' }}
      TELECOM_PRODUCT_NAME: ${{ vars.TELECOM_PRODUCT_NAME || '' }}
      TELECOM_EXPECTED_PLAN_ID: ${{ vars.TELECOM_EXPECTED_PLAN_ID || '' }}
      TELECOM_ACTION_DELAY_MS: ${{ vars.TELECOM_ACTION_DELAY_MS || '' }}
      TELECOM_POST_SUCCESS_WAIT_MS: ${{ vars.TELECOM_POST_SUCCESS_WAIT_MS || '' }}
      TELECOM_CONNECTIVITY_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.connectivity_mode || vars.TELECOM_CONNECTIVITY_MODE || 'direct' }}
      SMS_INBOX_PROVIDER: ${{ vars.SMS_INBOX_PROVIDER || 'pushplus' }}
      SMS_INBOX_URL: ${{ secrets.SMS_INBOX_URL || 'http://127.0.0.1:18787/messages' }}
      SMS_INBOX_HEALTH_URL: ${{ secrets.SMS_INBOX_HEALTH_URL || 'http://127.0.0.1:18787/health' }}
      SMS_INBOX_TOKEN: ${{ secrets.SMS_INBOX_TOKEN }}
      SMS_SENDER: ${{ vars.SMS_SENDER || '10001' }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      PUSHPLUS_SECRET_KEY: ${{ secrets.PUSHPLUS_SECRET_KEY }}
      PUSHPLUS_BASE_URL: ${{ vars.PUSHPLUS_BASE_URL || 'https://www.pushplus.plus' }}
      PUSHPLUS_KEYWORD: ${{ vars.PUSHPLUS_KEYWORD || '' }}
      PUSHPLUS_TITLE_KEYWORD: ${{ vars.PUSHPLUS_TITLE_KEYWORD || '' }}
      PUSHPLUS_PAGE_SIZE: ${{ vars.PUSHPLUS_PAGE_SIZE || '10' }}
      PUSHPLUS_DEBUG: ${{ vars.PUSHPLUS_DEBUG || 'false' }}
      PUSHPLUS_RELAY_INBOX_URL: ${{ vars.PUSHPLUS_RELAY_INBOX_URL || '' }}
      PUSHPLUS_RELAY_INBOX_TOKEN: ${{ secrets.PUSHPLUS_RELAY_INBOX_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELECOM_VISION_URL: ${{ vars.TELECOM_VISION_URL || 'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent' }}
      TELECOM_VISION_MODE: ${{ vars.TELECOM_VISION_MODE || 'gemini' }}
      TELECOM_VISION_MODEL: ${{ vars.TELECOM_VISION_MODEL || 'gemini-3.5-flash' }}
      SEND_CODE_ATTEMPTS: ${{ vars.SEND_CODE_ATTEMPTS || '' }}
      SMS_TIMEOUT_MS: ${{ vars.SMS_TIMEOUT_MS || '' }}
      SMS_POLL_MS: ${{ vars.SMS_POLL_MS || '' }}
      PROXY_POOL_HTTP_PROXY: ${{ secrets.PROXY_POOL_HTTP_PROXY || secrets.PUBLIC_HTTP_PROXY || '' }}
      OPENWRT_HTTP_PROXY: ${{ secrets.OPENWRT_HTTP_PROXY || secrets.HOME_HTTP_PROXY || secrets.PUBLIC_HTTP_PROXY || secrets.SCHWAB_PROXY_URL || secrets.BROWSER_PROXY_SERVER || '' }}
      PROXY_SSH_HOST: ${{ secrets.PROXY_SSH_HOST }}
      PROXY_SSH_USER: ${{ secrets.PROXY_SSH_USER || vars.PROXY_SSH_USER || 'root' }}
      PROXY_SSH_PORT: ${{ secrets.PROXY_SSH_PORT || vars.PROXY_SSH_PORT || '22' }}
      PROXY_SSH_PRIVATE_KEY: ${{ secrets.PROXY_SSH_PRIVATE_KEY }}
      PROXY_SSH_KNOWN_HOSTS: ${{ secrets.PROXY_SSH_KNOWN_HOSTS }}
      PROXY_TUNNEL_LOCAL_PORT: ${{ vars.PROXY_TUNNEL_LOCAL_PORT || '13128' }}
      PROXY_TUNNEL_REMOTE_ENDPOINT: ${{ secrets.PROXY_TUNNEL_REMOTE_ENDPOINT || vars.PROXY_TUNNEL_REMOTE_ENDPOINT || '127.0.0.1:13128' }}
      PROXY_HEALTH_URL: ${{ vars.PROXY_HEALTH_URL || 'https://wapbj.189.cn/' }}
      HEADLESS: "false"
      BROWSER_CHANNEL: chrome
      BROWSER_CDP_URL: "http://127.0.0.1:9222"
      TELECOM_STEALTH_MODE: "false"
      TELECOM_MINIMAL_LOGIN: "true"
      TELECOM_SKIP_ORIGIN_WARMUP: "true"
      TELECOM_CDP_PROFILE_MODE: "native"
      TELECOM_REQUIRE_REAL_CHROME: "true"
      TELECOM_CHROME_PROFILE: "/tmp/telecom-claim-cdp"
      TELECOM_SLIDER_MODE: "api"
      TELECOM_USE_DEFAULT_CHROME: "1"
      ALLOW_DIRECT_PROXY_FALLBACK: ${{ vars.ALLOW_DIRECT_PROXY_FALLBACK || 'false' }}
      FAIL_ONLY_FINAL_DAY: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
      FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
      DRY_RUN_BEFORE_FINAL_SUBMIT: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Cleanup stale self-hosted git refs
        if: runner.environment == 'self-hosted'
        run: |
          set -euo pipefail
          if [ -d "$GITHUB_WORKSPACE/.git/refs" ]; then
            find "$GITHUB_WORKSPACE/.git/refs" -type f -name '* *' -print -delete || true
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - name: Decide whether claim is needed
        id: claim_plan
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const forceRun = /^true$/i.test(process.env.FORCE_RUN || '');
          const parts = new Intl.DateTimeFormat('en-CA', {
            timeZone: 'Asia/Shanghai',
            year: 'numeric',
            month: '2-digit',
          }).formatToParts(new Date());
          const year = parts.find(part => part.type === 'year')?.value;
          const month = parts.find(part => part.type === 'month')?.value;
          const stateFile = `state/${year}-${month}.json`;

          let alreadySuccessful = false;
          if (fs.existsSync(stateFile)) {
            try {
              alreadySuccessful = JSON.parse(fs.readFileSync(stateFile, 'utf8')).status === 'success';
            } catch {
              alreadySuccessful = false;
            }
          }

          const shouldRun = forceRun || !alreadySuccessful;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=${shouldRun ? 'true' : 'false'}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `state_file=${stateFile}\n`);

          if (!shouldRun) {
            console.log(`State ${stateFile} already records success; skip external tunnel. Set FORCE_RUN=true to override.`);
          } else if (forceRun) {
            console.log('FORCE_RUN=true; claim will run even if state already records success.');
          } else {
            console.log(`No successful state found in ${stateFile}; claim will run.`);
          }
          NODE

      - if: steps.claim_plan.outputs.should_run == 'true' && runner.os == 'Linux'
        name: Install Google Chrome for real-browser CDP
        run: |
          set -euo pipefail
          # Prefer real Google Chrome over Playwright-bundled Chromium.
          if command -v google-chrome-stable >/dev/null 2>&1 || command -v google-chrome >/dev/null 2>&1; then
            echo "Google Chrome already installed"
          else
            wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            sudo apt-get update
            sudo apt-get install -y /tmp/chrome.deb
          fi
          google-chrome --version || google-chrome-stable --version

      - if: steps.claim_plan.outputs.should_run == 'true' && runner.os == 'macOS'
        name: Verify local Google Chrome for real-browser CDP
        run: |
          set -euo pipefail
          test -x "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
          "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --version

      - name: Validate connectivity
        if: steps.claim_plan.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          case "${TELECOM_CONNECTIVITY_MODE:-direct}" in
            direct|http_proxy|ssh_tunnel|proxy_pool) ;;
            *)
              echo "::error::Unsupported TELECOM_CONNECTIVITY_MODE: ${TELECOM_CONNECTIVITY_MODE}. Use direct, http_proxy, ssh_tunnel, or proxy_pool."
              exit 1
              ;;
          esac
          sms_provider="$(printf '%s' "${SMS_INBOX_PROVIDER:-pushplus}" | tr '[:upper:]' '[:lower:]')"
          if [ "$sms_provider" = "pushplus" ]; then
            if [ -n "${PUSHPLUS_RELAY_INBOX_URL:-}" ]; then
              : "${PUSHPLUS_RELAY_INBOX_TOKEN:?Missing PUSHPLUS_RELAY_INBOX_TOKEN secret}"
            else
              : "${PUSHPLUS_TOKEN:?Missing PUSHPLUS_TOKEN secret}"
              : "${PUSHPLUS_SECRET_KEY:?Missing PUSHPLUS_SECRET_KEY secret}"
            fi
            echo "Workflow will read SMS from PushPlus; skipping SMS inbox health check."
          else
            : "${SMS_INBOX_TOKEN:?Missing SMS_INBOX_TOKEN secret}"
            case "$SMS_INBOX_URL" in
              http://127.0.0.1:*|https://127.0.0.1:*|http://localhost:*|https://localhost:*)
                echo "SMS_INBOX_URL must be reachable from the GitHub-hosted runner, not the default loopback URL."
                exit 1
                ;;
            esac
            case "$SMS_INBOX_HEALTH_URL" in
              http://127.0.0.1:*|https://127.0.0.1:*|http://localhost:*|https://localhost:*)
                echo "SMS_INBOX_HEALTH_URL must be reachable from the GitHub-hosted runner, not the default loopback URL."
                exit 1
                ;;
            esac
            curl -fsS --connect-timeout 8 --max-time 20 --retry 2 --retry-delay 3 --retry-all-errors \
              -H "Authorization: Bearer $SMS_INBOX_TOKEN" "$SMS_INBOX_HEALTH_URL" >/dev/null
          fi
          case "${TELECOM_CONNECTIVITY_MODE:-direct}" in
            direct)
              echo "OPENWRT_HTTP_PROXY=" >> "$GITHUB_ENV"
              ;;
            http_proxy)
              : "${OPENWRT_HTTP_PROXY:?Missing OPENWRT_HTTP_PROXY, HOME_HTTP_PROXY, PUBLIC_HTTP_PROXY, SCHWAB_PROXY_URL, or BROWSER_PROXY_SERVER secret for http_proxy mode}"
              case "$OPENWRT_HTTP_PROXY" in
                http://127.0.0.1:*|http://localhost:*)
                  echo "http_proxy mode requires a proxy reachable from the runner, not a loopback URL. Use ssh_tunnel mode for SSH forwarding."
                  exit 1
                  ;;
              esac
              curl -sSI --proxy "$OPENWRT_HTTP_PROXY" --connect-timeout 8 --max-time 20 "$PROXY_HEALTH_URL" >/dev/null
              ;;
            ssh_tunnel)
              : "${PROXY_SSH_HOST:?Missing PROXY_SSH_HOST secret for ssh_tunnel mode}"
              : "${PROXY_SSH_PRIVATE_KEY:?Missing PROXY_SSH_PRIVATE_KEY secret for ssh_tunnel mode}"
              : "${PROXY_TUNNEL_LOCAL_PORT:?Missing PROXY_TUNNEL_LOCAL_PORT variable for ssh_tunnel mode}"
              : "${PROXY_TUNNEL_REMOTE_ENDPOINT:?Missing PROXY_TUNNEL_REMOTE_ENDPOINT variable or secret for ssh_tunnel mode}"
              ssh_dir="$RUNNER_TEMP/proxy-ssh"
              mkdir -p "$ssh_dir"
              chmod 700 "$ssh_dir"
              key_file="$ssh_dir/key"
              known_hosts_file="$ssh_dir/known_hosts"
              printf '%s\n' "$PROXY_SSH_PRIVATE_KEY" > "$key_file"
              chmod 600 "$key_file"
              if [ -n "${PROXY_SSH_KNOWN_HOSTS:-}" ]; then
                printf '%s\n' "$PROXY_SSH_KNOWN_HOSTS" > "$known_hosts_file"
              else
                ssh-keyscan -p "${PROXY_SSH_PORT:-22}" "$PROXY_SSH_HOST" > "$known_hosts_file" 2>/dev/null
              fi
              chmod 600 "$known_hosts_file"
              control_path="$ssh_dir/control-%C"
              ssh -i "$key_file" \
                -p "${PROXY_SSH_PORT:-22}" \
                -o BatchMode=yes \
                -o ExitOnForwardFailure=yes \
                -o StrictHostKeyChecking=yes \
                -o UserKnownHostsFile="$known_hosts_file" \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=10 \
                -o TCPKeepAlive=yes \
                -o IPQoS=none \
                -o Compression=no \
                -o ControlMaster=auto \
                -o ControlPath="$control_path" \
                -o ControlPersist=300 \
                -N -L "127.0.0.1:${PROXY_TUNNEL_LOCAL_PORT}:${PROXY_TUNNEL_REMOTE_ENDPOINT}" \
                "${PROXY_SSH_USER:-root}@${PROXY_SSH_HOST}" &
              tunnel_pid="$!"
              echo "PROXY_TUNNEL_PID=$tunnel_pid" >> "$GITHUB_ENV"
              echo "OPENWRT_HTTP_PROXY=http://127.0.0.1:${PROXY_TUNNEL_LOCAL_PORT}" >> "$GITHUB_ENV"
              for attempt in $(seq 1 20); do
                if nc -z 127.0.0.1 "${PROXY_TUNNEL_LOCAL_PORT}" >/dev/null 2>&1; then
                  break
                fi
                if ! kill -0 "$tunnel_pid" >/dev/null 2>&1; then
                  echo "SSH tunnel exited before local proxy port was ready."
                  exit 1
                fi
                if [ "$attempt" = "20" ]; then
                  echo "SSH tunnel local proxy port did not become ready in time."
                  exit 1
                fi
                sleep 1
              done
              proxy_url="http://127.0.0.1:${PROXY_TUNNEL_LOCAL_PORT}"
              proxy_probe_ok=0
              for probe in $(seq 1 5); do
                if curl -sS --connect-timeout 8 --max-time 20 --proxy "$proxy_url" "$PROXY_HEALTH_URL" -o /dev/null; then
                  proxy_probe_ok=$((proxy_probe_ok + 1))
                fi
              done
              if [ "$proxy_probe_ok" -lt 3 ]; then
                echo "SSH tunnel proxy stress check failed (${proxy_probe_ok}/5 probes succeeded)."
                exit 1
              fi
              echo "SSH tunnel proxy stress check passed (${proxy_probe_ok}/5 probes)."
              ;;
            proxy_pool)
              : "${PROXY_POOL_HTTP_PROXY:?Missing PROXY_POOL_HTTP_PROXY secret for proxy_pool mode}"
              curl -sSI --proxy "$PROXY_POOL_HTTP_PROXY" --connect-timeout 8 --max-time 20 "$PROXY_HEALTH_URL" >/dev/null
              echo "Proxy pool check passed."
              echo "OPENWRT_HTTP_PROXY=$PROXY_POOL_HTTP_PROXY" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Run claim via real Chrome CDP
        id: claim
        if: steps.claim_plan.outputs.should_run == 'true'
        run: bash scripts/run-real-chrome-claim.sh

      - name: Upload claim debug screenshots
        if: always() && steps.claim_plan.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claim-debug-${{ github.run_id }}
          path: artifacts/claim-debug/
          if-no-files-found: ignore

      - name: Cleanup Chrome CDP and SSH tunnel
        if: always()
        run: |
          set +e
          if [ -n "${CHROME_CDP_PID:-}" ]; then
            kill "$CHROME_CDP_PID" 2>/dev/null || true
          fi
          if [ -n "${XVFB_PID:-}" ]; then
            kill "$XVFB_PID" 2>/dev/null || true
          fi
          if [ -n "${PROXY_TUNNEL_PID:-}" ]; then
            kill "$PROXY_TUNNEL_PID" 2>/dev/null || true
          fi
          pkill -f "remote-debugging-port=9222" 2>/dev/null || true
          pkill -x Xvfb 2>/dev/null || true

      - name: Commit monthly state
        if: always() && github.event.inputs.dry_run != 'true' && steps.claim_plan.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state || true
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "Record telecom monthly claim state"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Create issue on final failure
        if: failure() && github.event.inputs.dry_run != 'true' && steps.claim_plan.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/create-failure-issue.js

      - name: Resolve run log outcome
        id: run_log
        if: always()
        env:
          SHOULD_RUN: ${{ steps.claim_plan.outputs.should_run || 'false' }}
          STATE_FILE: ${{ steps.claim_plan.outputs.state_file || '' }}
          STEP_OUTCOME: ${{ steps.claim.outcome || 'skipped' }}
        run: node scripts/resolve-run-log-outcome.js

      - name: Record run log on logs branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUN_LOG_STATUS: ${{ job.status }}
          RUN_LOG_CLAIM_OUTCOME: ${{ steps.run_log.outputs.claim_outcome || steps.claim.outcome || 'skipped' }}
          RUN_LOG_FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          RUN_LOG_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: bash scripts/write-run-log-branch.sh
