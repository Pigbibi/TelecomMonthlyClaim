name: Monthly Beijing Telecom Claim

on:
  schedule:
    # Beijing time 08:00 on day 1-3 each month.
    - cron: "0 0 1-3 * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Ignore monthly success state and run anyway"
        required: false
        default: "false"
      dry_run:
        description: "Stop before the final telecom submit button"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TELECOM_PHONE: ${{ secrets.TELECOM_PHONE }}
      TELECOM_ENTRY_URL: ${{ secrets.TELECOM_ENTRY_URL }}
      TELECOM_TARGET_PACKAGE: ${{ vars.TELECOM_TARGET_PACKAGE || '5g' }}
      TELECOM_PRODUCT_NAME: ${{ vars.TELECOM_PRODUCT_NAME || '互联网卡网龄享5GB国内通用流量' }}
      TELECOM_EXPECTED_PLAN_ID: ${{ vars.TELECOM_EXPECTED_PLAN_ID || '24BJ100433' }}
      SMS_INBOX_URL: ${{ secrets.SMS_INBOX_URL || 'http://127.0.0.1:18787/messages' }}
      SMS_INBOX_HEALTH_URL: ${{ secrets.SMS_INBOX_HEALTH_URL || 'http://127.0.0.1:18787/health' }}
      SMS_INBOX_TOKEN: ${{ secrets.SMS_INBOX_TOKEN }}
      OPENWRT_HTTP_PROXY: ${{ secrets.OPENWRT_HTTP_PROXY || secrets.HOME_HTTP_PROXY || secrets.PUBLIC_HTTP_PROXY || secrets.SCHWAB_PROXY_URL || secrets.BROWSER_PROXY_SERVER || 'http://127.0.0.1:13128' }}
      BWG_SSH_HOST: ${{ secrets.BWG_SSH_HOST }}
      BWG_SSH_USER: ${{ secrets.BWG_SSH_USER || 'root' }}
      BWG_SSH_PORT: ${{ secrets.BWG_SSH_PORT || '22' }}
      BWG_SSH_PRIVATE_KEY: ${{ secrets.BWG_SSH_PRIVATE_KEY }}
      BWG_KNOWN_HOSTS: ${{ secrets.BWG_KNOWN_HOSTS }}
      HEADLESS: "false"
      BROWSER_CHANNEL: chrome
      ALLOW_DIRECT_PROXY_FALLBACK: ${{ vars.ALLOW_DIRECT_PROXY_FALLBACK || 'true' }}
      FAIL_ONLY_FINAL_DAY: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
      FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
      DRY_RUN_BEFORE_FINAL_SUBMIT: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - name: Decide whether claim is needed
        id: claim_plan
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const forceRun = /^true$/i.test(process.env.FORCE_RUN || '');
          const parts = new Intl.DateTimeFormat('en-CA', {
            timeZone: 'Asia/Shanghai',
            year: 'numeric',
            month: '2-digit',
          }).formatToParts(new Date());
          const year = parts.find(part => part.type === 'year')?.value;
          const month = parts.find(part => part.type === 'month')?.value;
          const stateFile = `state/${year}-${month}.json`;

          let alreadySuccessful = false;
          if (fs.existsSync(stateFile)) {
            try {
              alreadySuccessful = JSON.parse(fs.readFileSync(stateFile, 'utf8')).status === 'success';
            } catch {
              alreadySuccessful = false;
            }
          }

          const shouldRun = forceRun || !alreadySuccessful;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_run=${shouldRun ? 'true' : 'false'}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `state_file=${stateFile}\n`);

          if (!shouldRun) {
            console.log(`State ${stateFile} already records success; skip external tunnel. Set FORCE_RUN=true to override.`);
          } else if (forceRun) {
            console.log('FORCE_RUN=true; claim will run even if state already records success.');
          } else {
            console.log(`No successful state found in ${stateFile}; claim will run.`);
          }
          NODE

      - if: steps.claim_plan.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Open SSH tunnel to home proxy and SMS inbox via BWG
        if: steps.claim_plan.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          : "${BWG_SSH_HOST:?Missing BWG_SSH_HOST secret}"
          : "${BWG_SSH_PRIVATE_KEY:?Missing BWG_SSH_PRIVATE_KEY secret}"
          : "${SMS_INBOX_TOKEN:?Missing SMS_INBOX_TOKEN secret}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$BWG_SSH_PRIVATE_KEY" > ~/.ssh/bwg_key
          chmod 600 ~/.ssh/bwg_key
          if [ -n "${BWG_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$BWG_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$BWG_SSH_PORT" -H "$BWG_SSH_HOST" >> ~/.ssh/known_hosts
          fi
          close_tunnel() {
            pkill -f 'ssh .*127[.]0[.]0[.]1:18787:127[.]0[.]0[.]1:18787.*127[.]0[.]0[.]1:13128:127[.]0[.]0[.]1:13128' >/dev/null 2>&1 || true
          }

          open_tunnel() {
            close_tunnel
            ssh -i ~/.ssh/bwg_key \
              -p "$BWG_SSH_PORT" \
              -o ExitOnForwardFailure=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=3 \
              -N -f \
              -L 127.0.0.1:18787:127.0.0.1:18787 \
              -L 127.0.0.1:13128:127.0.0.1:13128 \
              "$BWG_SSH_USER@$BWG_SSH_HOST"
          }

          check_sms_inbox() {
            curl -fsS --connect-timeout 8 --max-time 20 --retry 2 --retry-delay 3 --retry-all-errors \
              -H "Authorization: Bearer $SMS_INBOX_TOKEN" "$SMS_INBOX_HEALTH_URL" >/dev/null
          }

          check_home_proxy() {
            [ -n "${OPENWRT_HTTP_PROXY:-}" ] || return 0
            curl -sSI --proxy "$OPENWRT_HTTP_PROXY" --connect-timeout 8 --max-time 20 https://wapbj.189.cn/ >/dev/null
          }

          sms_ok=false
          proxy_ok=false
          for attempt in 1 2 3; do
            echo "Opening BWG tunnel and checking home proxy path (${attempt}/3)..."
            open_tunnel

            if check_sms_inbox; then
              sms_ok=true
              echo "SMS inbox health check passed."
            else
              sms_ok=false
              echo "SMS inbox health check failed."
            fi

            if [ "$sms_ok" = "true" ] && check_home_proxy; then
              proxy_ok=true
              echo "Home proxy check passed."
              break
            fi

            proxy_ok=false
            echo "Home proxy check failed."
            if [ "$attempt" != "3" ]; then
              close_tunnel
              sleep $((attempt * 5))
            fi
          done

          if [ "$sms_ok" != "true" ]; then
            echo "SMS inbox is required and did not recover."
            exit 1
          fi

          if [ "$proxy_ok" != "true" ]; then
            if [ "${ALLOW_DIRECT_PROXY_FALLBACK:-false}" = "true" ]; then
              echo "Home proxy did not recover; continuing without OPENWRT_HTTP_PROXY for this run."
              echo "OPENWRT_HTTP_PROXY=" >> "$GITHUB_ENV"
            else
              echo "Home proxy did not recover and direct fallback is disabled."
              exit 1
            fi
          fi

      - name: Run claim through home exit proxy
        id: claim
        if: steps.claim_plan.outputs.should_run == 'true'
        run: xvfb-run -a node scripts/telecom-monthly-claim.js

      - name: Commit monthly state
        if: always() && github.event.inputs.dry_run != 'true' && steps.claim_plan.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state || true
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "Record telecom monthly claim state"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Create issue on final failure
        if: failure() && github.event.inputs.dry_run != 'true' && steps.claim_plan.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/create-failure-issue.js

      - name: Record run log on logs branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUN_LOG_STATUS: ${{ job.status }}
          RUN_LOG_CLAIM_OUTCOME: ${{ steps.claim.outcome || 'skipped' }}
          RUN_LOG_FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          RUN_LOG_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: bash scripts/write-run-log-branch.sh
