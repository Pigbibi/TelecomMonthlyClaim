name: Monthly Beijing Telecom Claim

on:
  schedule:
    # Beijing time 08:00 on day 1-3 each month.
    - cron: "0 0 1-3 * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Ignore monthly success state and run anyway"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TELECOM_PHONE: ${{ secrets.TELECOM_PHONE }}
      TELECOM_ENTRY_URL: ${{ secrets.TELECOM_ENTRY_URL }}
      TELECOM_TARGET_PACKAGE: ${{ vars.TELECOM_TARGET_PACKAGE || '5g' }}
      TELECOM_PRODUCT_NAME: ${{ vars.TELECOM_PRODUCT_NAME || '互联网卡网龄享5GB国内通用流量' }}
      TELECOM_EXPECTED_PLAN_ID: ${{ vars.TELECOM_EXPECTED_PLAN_ID || '24BJ100433' }}
      SMS_INBOX_URL: ${{ secrets.SMS_INBOX_URL }}
      SMS_INBOX_TOKEN: ${{ secrets.SMS_INBOX_TOKEN }}
      OPENWRT_HTTP_PROXY: ${{ secrets.OPENWRT_HTTP_PROXY }}
      WG_CONFIG_BASE64: ${{ secrets.WG_CONFIG_BASE64 }}
      HEADLESS: "false"
      BROWSER_CHANNEL: chrome
      FAIL_ONLY_FINAL_DAY: "true"
      FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium

      - name: Run claim through optional WireGuard/OpenWrt proxy
        run: ./scripts/run-with-wireguard.sh xvfb-run -a node scripts/telecom-monthly-claim.js

      - name: Commit monthly state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state || true
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "Record telecom monthly claim state"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Create issue on final failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/create-failure-issue.js
