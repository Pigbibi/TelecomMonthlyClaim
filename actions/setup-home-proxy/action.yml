name: Setup home proxy
description: |
  Opens a loopback SSH tunnel from the current runner to the BWG relay and
  verifies the home proxy path. Secrets are read from inputs/env and are never
  printed.
inputs:
  mode:
    description: "Proxy mode. Supported values: bwg, direct, proxy_pool, none."
    required: false
    default: bwg
  proxy-url:
    description: Proxy URL exposed to later workflow steps.
    required: false
    default: http://127.0.0.1:13128
  health-url:
    description: URL used to verify the proxy path.
    required: false
    default: https://wapbj.189.cn/
  proxy-pool-url:
    description: Authenticated fallback proxy URL for proxy_pool mode.
    required: false
    default: ''
  attempts:
    description: Number of BWG tunnel/proxy verification attempts.
    required: false
    default: '3'
  allow-direct-fallback:
    description: Clear OPENWRT_HTTP_PROXY and continue when BWG home proxy verification fails.
    required: false
    default: 'false'
  bwg-ssh-host:
    description: BWG SSH host.
    required: false
    default: ''
  bwg-ssh-user:
    description: BWG SSH user.
    required: false
    default: root
  bwg-ssh-port:
    description: BWG SSH port.
    required: false
    default: '22'
  bwg-ssh-private-key:
    description: BWG SSH private key.
    required: false
    default: ''
  bwg-known-hosts:
    description: Optional known_hosts content for BWG.
    required: false
    default: ''
  local-proxy-port:
    description: Local loopback port exposed on the runner.
    required: false
    default: '13128'
  remote-proxy-endpoint:
    description: BWG-side proxy endpoint forwarded to the runner.
    required: false
    default: 127.0.0.1:13128
  include-sms-tunnel:
    description: Whether to also forward the SMS inbox endpoint.
    required: false
    default: 'false'
  local-sms-port:
    description: Local SMS inbox loopback port exposed on the runner.
    required: false
    default: '18787'
  remote-sms-endpoint:
    description: BWG-side SMS endpoint forwarded to the runner.
    required: false
    default: 127.0.0.1:18787
outputs:
  proxy-url:
    description: Proxy URL to use in later workflow steps.
    value: ${{ steps.setup.outputs.proxy-url }}
  proxy-server:
    description: Alias of proxy-url for browser workflow compatibility.
    value: ${{ steps.setup.outputs.proxy-server }}
  proxy-source:
    description: Source label for the selected proxy path.
    value: ${{ steps.setup.outputs.proxy-source }}
  proxy-ready:
    description: 'true when the selected proxy path was verified.'
    value: ${{ steps.setup.outputs.proxy-ready }}
  tunnel-pid:
    description: Background SSH tunnel process id, when one was started.
    value: ${{ steps.setup.outputs.tunnel-pid }}
  key-file:
    description: Temporary private-key file path, when one was created.
    value: ${{ steps.setup.outputs.key-file }}
runs:
  using: composite
  steps:
    - id: setup
      shell: bash
      env:
        HOME_PROXY_MODE: ${{ inputs.mode }}
        HOME_PROXY_URL: ${{ inputs.proxy-url }}
        HOME_PROXY_HEALTH_URL: ${{ inputs.health-url }}
        PROXY_POOL_HTTP_PROXY: ${{ inputs.proxy-pool-url }}
        HOME_PROXY_ATTEMPTS: ${{ inputs.attempts }}
        HOME_PROXY_ALLOW_DIRECT_FALLBACK: ${{ inputs.allow-direct-fallback }}
        BWG_SSH_HOST: ${{ inputs.bwg-ssh-host }}
        BWG_SSH_USER: ${{ inputs.bwg-ssh-user }}
        BWG_SSH_PORT: ${{ inputs.bwg-ssh-port }}
        BWG_SSH_PRIVATE_KEY: ${{ inputs.bwg-ssh-private-key }}
        BWG_KNOWN_HOSTS: ${{ inputs.bwg-known-hosts }}
        HOME_PROXY_LOCAL_PORT: ${{ inputs.local-proxy-port }}
        HOME_PROXY_REMOTE_ENDPOINT: ${{ inputs.remote-proxy-endpoint }}
        HOME_PROXY_INCLUDE_SMS_TUNNEL: ${{ inputs.include-sms-tunnel }}
        HOME_PROXY_LOCAL_SMS_PORT: ${{ inputs.local-sms-port }}
        HOME_PROXY_REMOTE_SMS_ENDPOINT: ${{ inputs.remote-sms-endpoint }}
      run: bash "$GITHUB_ACTION_PATH/../../scripts/setup-home-proxy.sh"
